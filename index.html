
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BREWW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              black: 'rgb(var(--color-black) / <alpha-value>)',
              white: 'rgb(var(--color-white) / <alpha-value>)',
              neutral: {
                50: 'rgb(var(--color-neutral-50) / <alpha-value>)',
                100: 'rgb(var(--color-neutral-100) / <alpha-value>)',
                200: 'rgb(var(--color-neutral-200) / <alpha-value>)',
                300: 'rgb(var(--color-neutral-300) / <alpha-value>)',
                400: 'rgb(var(--color-neutral-400) / <alpha-value>)',
                500: 'rgb(var(--color-neutral-500) / <alpha-value>)',
                600: 'rgb(var(--color-neutral-600) / <alpha-value>)',
                700: 'rgb(var(--color-neutral-700) / <alpha-value>)',
                800: 'rgb(var(--color-neutral-800) / <alpha-value>)',
                900: 'rgb(var(--color-neutral-900) / <alpha-value>)',
                950: 'rgb(var(--color-neutral-950) / <alpha-value>)',
              },
              brew: {
                dark: 'rgb(var(--color-black) / <alpha-value>)',
                card: 'rgb(var(--color-neutral-900) / <alpha-value>)',
                accent: '#e94560',
                gold: '#fbbf24',
                foam: '#fef3c7'
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-black: 0 0 0;
        --color-white: 255 255 255;
        --color-neutral-50: 250 250 250;
        --color-neutral-100: 245 245 245;
        --color-neutral-200: 229 229 229;
        --color-neutral-300: 212 212 212;
        --color-neutral-400: 163 163 163;
        --color-neutral-500: 115 115 115;
        --color-neutral-600: 82 82 82;
        --color-neutral-700: 64 64 64;
        --color-neutral-800: 38 38 38;
        --color-neutral-900: 23 23 23;
        --color-neutral-950: 10 10 10;
      }

      .light-theme {
        --color-black: 255 255 255;
        --color-white: 0 0 0;
        --color-neutral-50: 10 10 10;
        --color-neutral-100: 23 23 23;
        --color-neutral-200: 38 38 38;
        --color-neutral-300: 64 64 64;
        --color-neutral-400: 82 82 82;
        --color-neutral-500: 115 115 115;
        --color-neutral-600: 163 163 163;
        --color-neutral-700: 212 212 212;
        --color-neutral-800: 229 229 229;
        --color-neutral-900: 245 245 245;
        --color-neutral-950: 250 250 250;
      }

      body {
        background-color: rgb(var(--color-black));
        color: rgb(var(--color-neutral-100));
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--color-neutral-950));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--color-neutral-700));
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--color-neutral-600));
      }

      /* Print styles for PDF export */
      @media print {
        body {
          background-color: white !important;
          color: black !important;
        }
        nav, .no-print, button {
          display: none !important;
        }
        .bg-neutral-900\/20, .bg-neutral-900\/30 {
          background-color: #f3f4f6 !important;
          border-color: #e5e7eb !important;
        }
        .text-white, .text-neutral-100, .text-neutral-200 {
          color: black !important;
        }
        .text-neutral-500, .text-neutral-600 {
          color: #4b5563 !important;
        }
        .border-neutral-800, .border-neutral-800\/50 {
          border-color: #d1d5db !important;
        }
        canvas, .recharts-surface {
          max-width: 100% !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
